version: '3.8'

services:
  # Servicio principal - CLI y Backend API
  swarm-cli:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: swarm-cli-dev
    
    # Volúmenes para hot reload
    volumes:
      # Montar todo el código fuente para hot reload
      - ./src:/app/src:rw
      # Montar package.json para detectar cambios en dependencias
      - ./package.json:/app/package.json:ro
      # Montar tsconfig.json
      - ./tsconfig.json:/app/tsconfig.json:ro
      # Volumen para node_modules (persistir entre reinicios)
      - node_modules:/app/node_modules
      # Volumen para datos persistentes (SQLite, etc)
      - swarm-data:/app/data
      # Volumen para logs
      - ./logs:/app/logs
      # Archivos de configuración locales
      - ./.env:/app/.env:ro
    
    # Puertos expuestos
    ports:
      - "3000:3000"      # API Backend
      - "9229:9229"      # Puerto de debugging de Node.js
    
    # Variables de entorno
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DEBUG=true
      - SWARM_DATA_PATH=/app/data
    
    # Comando para desarrollo con hot reload
    command: >
      sh -c "
        echo '⏳ Esperando archivos...' &&
        sleep 1 &&
        npx nodemon 
          --watch src 
          --ext ts,js,json 
          --exec 'ts-node' 
          --signal SIGTERM 
          src/backend/index.ts
      "
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Reiniciar automáticamente
    restart: unless-stopped
    
    # TTY interactivo para logs coloreados
    tty: true
    stdin_open: true

  # Servicio opcional - CLI interactivo
  swarm-cli-shell:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: swarm-cli-shell
    profiles: ["cli"]  # Solo se inicia con: docker-compose --profile cli run --rm swarm-cli-shell
    
    volumes:
      - ./src:/app/src:rw
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - node_modules:/app/node_modules
      - swarm-data:/app/data
      - ./.env:/app/.env:ro
    
    environment:
      - NODE_ENV=development
    
    # Entrar a shell interactivo
    command: /bin/sh
    
    tty: true
    stdin_open: true

volumes:
  node_modules:
    driver: local
  swarm-data:
    driver: local
