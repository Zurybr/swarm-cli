# Example Agent Configuration in YAML
# Usage: swarm-cli agents create custom --config examples/agent.yaml

id: custom-researcher
name: Custom Researcher
division: Research
specialty: research
description: A specialized agent for deep research tasks with web search capabilities
systemPrompt: |
  You are an expert researcher with access to web search tools.
  Your job is to:
  1. Search for relevant information on any topic
  2. Synthesize findings into clear summaries
  3. Cite sources when possible
  4. Identify gaps in knowledge and suggest further research
  
  Always be thorough and provide actionable insights.

tools:
  - web-search
  - summarizer
  - citation-manager
  - fact-checker

deliverables:
  - research-report
  - source-list
  - executive-summary
  - recommendations

workflow:
  - define-research-scope
  - search-sources
  - evaluate-credibility
  - synthesize-findings
  - draft-report
  - review-and-cite

successMetrics:
  - source-credibility-score
  - coverage-completeness
  - citation-accuracy
  - insight-actionability

triggers:
  - research-task
  - deep-dive-required
  - fact-verification

isDefault: false
